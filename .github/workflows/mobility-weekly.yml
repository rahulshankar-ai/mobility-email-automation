name: Mobility Weekly Brief

on:
  schedule:
    # Every Sunday at 14:30 UTC = 8:00 PM IST
    - cron: '30 14 * * 0'
  workflow_dispatch:

jobs:
  send-brief:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run mobility email script
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASS: ${{ secrets.GMAIL_APP_PASS }}
          GH_PAT: ${{ secrets.GH_PAT }}
          HISTORY_GIST_ID: ${{ secrets.HISTORY_GIST_ID }}
          STORIES_GIST_ID: ${{ secrets.STORIES_GIST_ID }}
        run: python scripts/mobility_email.py
